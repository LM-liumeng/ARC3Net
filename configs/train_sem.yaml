data:
  data_root: /data/LM/Dataset
  dataset_name: SHA
  labeled_ratio: 0.4
  batch_size: 4
  crop_size: 512
  downsample_ratio: 4
  num_workers: 8
  seed: 42

schedule:
  epochs_stage1: 2000
  epochs_stage2: 800
  eval_every: 10

optimizer:
  lr_stage1: 1.0e-5
  lr_stage2: 5.0e-6
  lr_backbone_mult: 0.5
  weight_decay: 1.0e-4
  grad_clip: 5.0

supervised_loss:
  w_den: 1.0
  w_patch: 0.05
  w_mask: 0.2
  w_low: 0.3
  w_res: 0.2
  w_res_neg: 0.01
  patch_grid: [8, 8]
  relation_grid: [8, 8]

mean_teacher:
  rampup_epochs: 200
  max_unsup_weight: 0.15
  w_u_feat: 1.0
  w_u_rel: 0.2
  w_u_out: 0.05
  ema_decay: 0.999
  mc_samples: 2
  rel_beta: 5.0
  tau_sigma: -2.0
  k_sigma: 2.0
  use_mask_pred: true
  mask_soft_strength: 0.5

model:
  sigma_unfreeze_epochs: 300

runtime:
  save_dir: ./checkpoint_sem
  gpu_id: "0"
  resume_stage1: ""
  resume_stage2: ""

