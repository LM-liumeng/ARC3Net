data:
  data_root: /data/LM/Dataset
  dataset_name: SHA
  labeled_ratio: 0.4
  batch_size: 4
  crop_size: 512
  downsample_ratio: 4
  num_workers: 8
  seed: 42

schedule:
  epochs_stage1: 2000
  epochs_stage2: 800
  eval_every: 10

optimizer:
  lr_stage1: 1.0e-5
  lr_stage2: 5.0e-6
  lr_backbone_mult: 0.5
  weight_decay: 1.0e-4
  grad_clip: 5.0
  amp: false

supervised_loss:
  w_density: 1.0
  w_count: 0.1
  w_patch: 0.1
  w_foreground: 0.1
  w_reliability: 0.1
  w_sigma_calibration: 0.05
  w_base: 0.25
  w_low: 0.2
  patch_grid: [8, 8]
  relation_grid: [8, 8]

mean_teacher:
  rampup_epochs: 200
  max_unsup_weight: 0.15
  w_u_feat: 1.0
  w_u_rel: 0.2
  w_u_out: 0.1
  w_u_count: 0.1
  w_u_reliability: 0.05
  ema_decay: 0.999
  mc_samples: 2
  rel_beta: 5.0

model:
  pretrained_path: ./weights/mambavision_base_21k.pth.tar
  sigma_unfreeze_epochs: 300

runtime:
  save_dir: ./checkpoint_arc3net
  gpu_id: "0"
  resume_stage1: ""
  resume_stage2: ""

